<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON TV Node Sale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Urbanist:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div class="container nav-inner">
            <div class="logo">Ton<span>TV</span> <small>NODE SALE</small></div>
            <button class="btn-wallet" onclick="connectWallet()">지갑 연결하기</button>
        </div>
    </header>

    <section id="hero">
        <div class="container hero-wrap">
            <div class="hero-text">
                <div class="badge">📡 텔레그램 WATCH-TO-EARN 숏폼 드라마 OTT</div>
                <h1>시청이 <span>자산</span>이 되는 시대,<br>그 인프라를 소유하세요.</h1>
                <p>톤티비는 텔레그램 10억 유저 위에서 작동하는 숏폼 드라마의 넷플릭스입니다.</p>
                <button class="btn-primary" onclick="startJoinProcess()">지금 노드 신청하기 <i class="fas fa-bolt"></i></button>
            </div>
            <div class="mockup-area">
                <div class="mockup-main">
                    <img src="https://via.placeholder.com/400x800/111622/FFFFFF?text=TON+TV+APP" alt="Mockup">
                    <div class="mining-badge">⛏️ +15 XNOT 실시간 채굴 중</div>
                </div>
            </div>
        </div>
    </section>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAllModals()">✕</span>
            <h3>🏛️ DAO 멤버 인증 (1단계)</h3>
            <p>보안을 위해 텔레그램 인증을 진행합니다.</p>
            <div id="telegram-widget-container">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="TonTVNodeBot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
            </div>
            <button class="btn-dev-only" onclick="onTelegramAuth({id: '123', first_name: 'TestUser', username: 'test_tg'})">[테스트용] 인증 건너뛰기</button>
        </div>
    </div>

    <div id="form-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAllModals()">✕</span>
            <h3>📝 회원 정보 입력 (2단계)</h3>
            <p>노드 배정 및 관리를 위한 정보를 입력해 주세요.</p>
            <form id="node-apply-form">
                <input type="hidden" id="tg-id" name="tg_id">
                <input type="hidden" id="tg-name" name="tg_name">
                
                <div class="input-group">
                    <label>성함 (실명)</label>
                    <input type="text" name="user_name" required placeholder="홍길동">
                </div>
                <div class="input-group">
                    <label>연락처</label>
                    <input type="tel" name="user_phone" required placeholder="010-0000-0000">
                </div>
                <div class="input-group">
                    <label>참여 희망 노드 수량</label>
                    <input type="number" name="node_count" value="1" min="1" required>
                </div>
                <button type="submit" class="btn-primary">신청 완료 및 지갑 연동하기</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
