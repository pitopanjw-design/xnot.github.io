<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tontv - 노드 권한 신청</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0f172a; /* tontv 느낌의 세련된 다크 테마 */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e293b;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        /* 1단계: 노드 신청 및 텔레그램 인증 영역 */
        .step-auth {
            display: block;
        }
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
        }
        .telegram-btn:hover {
            background-color: #0077b5;
        }
        .telegram-btn:active {
            transform: scale(0.98);
        }

        /* 2단계: 회원 정보 입력 폼 영역 (초기에는 숨김) */
        .step-signup {
            display: none;
            text-align: left;
        }
        .step-signup h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 24px;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #cbd5e1;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .terms-group {
            margin: 24px 0;
            padding: 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        .terms-text {
            font-size: 13px;
            color: #94a3b8;
            height: 90px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 8px;
            background: #1e293b;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .checkbox-label {
            font-size: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #cbd5e1;
        }
        .checkbox-label input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #10b981; /* 가입 단계는 성공/완료 느낌의 초록색 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="authStep" class="step-auth">
        <h1>tontv Node</h1>
        <p>노드 권한을 신청하기 위해 텔레그램 인증을 완료해 주세요.</p>
        
        <button type="button" class="telegram-btn" onclick="simulateTelegramAuth()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="margin-right: 8px; vertical-align: middle;">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM16.64 8.8C16.49 9.53 13.51 22.18 13.51 22.18C13.51 22.18 13.34 22.35 13.13 22.34C12.92 22.33 12.74 22.14 12.74 22.14L9.04 19.34L7.25 21.05C7.11 21.19 6.94 21.24 6.8 21.22L7.33 16.4L15.96 8.56C16.08 8.45 16.08 8.29 15.93 8.35C15.78 8.41 11.23 11.31 11.23 11.31L6.75 9.92C6.75 9.92 6.54 9.85 6.52 9.68C6.5 9.51 6.72 9.4 6.72 9.4L20.15 4.19C20.15 4.19 20.39 4.09 20.53 4.23C20.67 4.37 20.63 4.67 20.63 4.67L16.64 8.8Z" fill="white"/>
            </svg>
            텔레그램 인증 후 노드 신청하기
        </button>
    </div>

    <div id="signupStep" class="step-signup">
        <h2>노드 신청 정보 입력</h2>
        
        <form id="signupForm" action="https://script.google.com/macros/s/AKfycby9iDAPz5poIwoPlaWmR9argoVi3QqrIf_ZlOuoerWmO1Piub_Sy6Oji1X0XW-a5s8GXw/exec" method="POST">
            
            <div class="input-group">
                <label for="userName">이름</label>
                <input type="text" id="userName" name="userName" placeholder="이름을 입력하세요" required>
            </div>

            <div class="input-group">
                <label for="userPhone">핸드폰 번호</label>
                <input type="tel" id="userPhone" name="userPhone" placeholder="010-1234-5678" required>
            </div>

            <div class="input-group">
                <label for="referralCode">추천인 코드</label>
                <input type="text" id="referralCode" name="referralCode" placeholder="추천인 코드가 있다면 입력 (선택)">
            </div>

            <div class="terms-group">
                <label class="checkbox-label" style="margin-bottom: 8px; font-weight: bold;">투자 약관</label>
                <div class="terms-text">
                    제 1 조 (목적) 본 약관은 tontv 노드 권한 신청 및 이에 수반되는 투자 참여 조항과 관련하여 회원과 회사 간의 책임 권리를 규정함을 목적으로 합니다...
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="agreeTerms" name="agreeTerms" value="동의함" required>
                    투자 약관 내용을 확인했으며 이에 동의합니다. (필수)
                </label>
            </div>

            <button type="submit" class="submit-btn">최종 신청 및 가입 완료</button>
        </form>
    </div>

</div>

<script>
    // [함수] 텔레그램 인증 성공 시 화면을 전환하는 로직
    function simulateTelegramAuth() {
        // 실제 연동 시에는 인증 창 팝업 후 성공 callback 콜백을 통해 이 함수가 실행되게 합니다.
        alert('텔레그램 본인 확인이 완료되었습니다!\n회원 정보를 입력해 주세요.');
        
        // 1단계 인증 버튼 숨기고, 2단계 가입 폼 보여주기
        document.getElementById('authStep').style.display = 'none';
        document.getElementById('signupStep').style.display = 'block';
    }

    // 폼 제출 이벤트 제어
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        const checkbox = document.getElementById('agreeTerms');
        if (!checkbox.checked) {
            e.preventDefault();
            alert('투자 약관에 동의하셔야 최종 신청이 가능합니다.');
            return;
        }
        
        // 정보가 성공적으로 전송될 것임을 안내 (구글 앱스 스크립트로 폼이 전송됨)
        alert('신청 정보가 안전하게 제출됩니다. 완료 페이지로 이동합니다.');
    });
</script>

</body>
</html>
