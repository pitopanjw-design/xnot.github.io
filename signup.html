<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노드 신청 - 회원가입</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signup-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .terms-group {
            margin: 20px 0;
            padding: 12px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        .terms-text {
            font-size: 12px;
            color: #666;
            height: 80px;
            overflow-y: scroll;
            border: 1px solid #ddd;
            padding: 6px;
            background: #fff;
            margin-bottom: 8px;
        }
        .checkbox-label {
            font-size: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox-label input {
            margin-right: 8px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #0088cc; /* 텔레그램 느낌의 블루 */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background-color: #0077b5;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>노드 권한 신청 (회원정보)</h2>
    
    <form id="signupForm" action="https://script.google.com/macros/s/AKfycby9iDAPz5poIwoPlaWmR9argoVi3QqrIf_ZlOuoerWmO1Piub_Sy6Oji1X0XW-a5s8GXw/exec" method="POST">
        
        <div class="input-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" name="userName" placeholder="홍길동" required>
        </div>

        <div class="input-group">
            <label for="userPhone">핸드폰 번호</label>
            <input type="tel" id="userPhone" name="userPhone" placeholder="010-1234-5678" required>
        </div>

        <div class="input-group">
            <label for="referralCode">추천인 코드 (선택)</label>
            <input type="text" id="referralCode" name="referralCode" placeholder="추천인 코드가 있다면 입력">
        </div>

        <div class="terms-group">
            <label class="checkbox-label">투자 약관 내용</label>
            <div class="terms-text">
                제 1 조 (목적) 본 약관은 노드 신청 및 투자 참여와 관련하여 회원과 회사 간의 권리와 의무를 규정함을 목적으로 합니다... (여기에 구체적인 약관 내용을 적으세요)
            </div>
            <label class="checkbox-label">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" value="동의함" required>
                투자 약관에 동의합니다. (필수)
            </label>
        </div>

        <button type="submit" class="submit-btn">가입 및 노드 신청하기</button>
    </form>
</div>

<script>
    // 폼 제출 시 작동할 간단한 자바스크립트
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        const checkbox = document.getElementById('agreeTerms');
        
        if (!checkbox.checked) {
            e.preventDefault();
            alert('투자 약관에 동의하셔야 가입이 가능합니다.');
            return;
        }
        
        // 데이터베이스가 연결되기 전, 구글 시트 주소를 넣지 않았을 때의 임시 작동 확인용
        if (this.action.includes('YOUR_WEB_APP_URL_HERE')) {
            e.preventDefault();
            alert('구글 시트 연동 전 임시 확인입니다.\n\n이름: ' + document.getElementById('userName').value + 
                  '\n번호: ' + document.getElementById('userPhone').value + 
                  '\n추천인: ' + document.getElementById('referralCode').value);
        }
    });
</script>

</body>
</html>
